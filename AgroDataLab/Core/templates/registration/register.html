
{% extends "base.html" %}
{% block content %}

<div class="flex min-h-full flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <h2 class="mt-6 text-center text-3xl font-bold tracking-tight text-slate-900">Registro de usuario</h2>
        <p class="mt-2 text-center text-sm text-slate-600">
            ¿Ya tienes cuenta?
            <a href="{% url 'login' %}" class="font-medium text-emerald-600 hover:text-emerald-500">inicia sesión aquí</a>
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white px-8 py-10 shadow-sm ring-1 ring-slate-200 sm:rounded-2xl sm:px-10">
            <form method="post" class="space-y-6">
                {% csrf_token %}
                
                <div class="space-y-4">
                    {{ form.as_p }}
                </div>

                <div>
                    <button type="submit" class="flex w-full justify-center rounded-lg bg-emerald-600 px-3 py-2.5 text-sm font-semibold leading-6 text-white shadow-sm hover:bg-emerald-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-emerald-600 transition-all">
                        Crear cuenta
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    /* Estilizar los inputs que genera Django automáticamente */
    p label { display: block; font-size: 0.875rem; font-weight: 500; color: #334155; margin-bottom: 0.25rem; }
    p input { 
        display: block; width: 100%; border-radius: 0.5rem; border: 1px solid #cbd5e1; padding: 0.5rem 0.75rem;
        font-size: 0.875rem; color: #0f172a; transition: border-color 0.2s; margin-bottom: 1rem;
    }
    p input:focus { outline: none; border-color: #10b981; ring: 2px solid #10b981; }
    .helptext { display: block; font-size: 0.75rem; color: #64748b; margin-top: -0.5rem; margin-bottom: 1rem; }
    .errorlist { color: #dc2626; font-size: 0.75rem; margin-bottom: 0.5rem; }
</style>

{% endblock %}
