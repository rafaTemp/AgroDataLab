{% extends "base.html" %}

{% block title %}Registro - AgroDataLab{% endblock %}

{% block content %}
    <h2>Crear Cuenta</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Registrarse</button>
    </form>
    <p>¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión</a></p>
{% endblock %}
