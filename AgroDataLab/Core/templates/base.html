<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AgroDataLab{% endblock %}</title>
</head>
<body>
    <header>
        <h1>AgroDataLab</h1>
        {% include "navbar.html" %}
    </header>

    <main>
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <p>{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    {% include "footer.html" %}
</body>
</html>
