{% extends "base.html" %}
{% load static %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'Alert/css/alert.css' %}">
{% endblock %}
{% block content %}
<h2>{% if object %}Editar{% else %}Nueva{% endif %} Alerta</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Guardar Alerta</button>
    <a href="{% url 'alert_list' %}">Cancelar</a>
</form>
{% endblock %}
